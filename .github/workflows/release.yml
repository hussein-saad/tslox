name: Release
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack tarball
        run: pnpm pack --pack-destination build

      - name: Find tarball name
        id: tarball
        run: echo "path=$(ls build/*.tgz | head -n 1)" >> "$GITHUB_OUTPUT"

      - name: Update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          generate_release_notes: false
          files: ${{ steps.tarball.outputs.path }}
          overwrite_files: true
